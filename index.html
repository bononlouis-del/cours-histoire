<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inclusion | Soft Pastel Edition</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --pastel-blue: #bae6fd;
            --pastel-pink: #fbcfe8;
            --pastel-green: #bbf7d0;
            --pastel-purple: #e9d5ff;
            --pastel-yellow: #fef08a;
            --pastel-orange: #fed7aa;
            
            --apple-bg: #fcfcfd;
            --apple-glass: rgba(255, 255, 255, 0.85);
            --apple-text: #323235;
            --apple-sub: #8e8e93;
            --spring: cubic-bezier(0.4, 0, 0.2, 1);
            --soft-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            --deep-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--apple-bg);
            color: var(--apple-text);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar: List View */
        .sidebar {
            width: 400px;
            background: white;
            border-right: 1px solid #f1f1f4;
            display: flex;
            flex-direction: column;
            z-index: 2000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.02);
        }

        .header {
            padding: 40px 30px 20px 30px;
        }

        h1 { margin: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.8px; color: #1a1a1c; }
        .subtitle { color: var(--apple-sub); font-size: 14px; margin-top: 6px; font-weight: 500; }

        /* Search Bar */
        .search-container { padding: 0 30px 25px 30px; }
        .search-bar {
            background: #f4f4f7;
            border: 2px solid transparent;
            padding: 12px 20px;
            border-radius: 15px;
            width: calc(100% - 44px);
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            font-weight: 500;
        }
        .search-bar:focus { 
            background: white;
            border-color: #e2e2e7;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        /* Location List */
        .location-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
            scrollbar-width: none;
        }
        .location-list::-webkit-scrollbar { display: none; }

        .location-item {
            padding: 20px 20px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s var(--spring);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
        }
        .location-item:hover { 
            background: #fafafb;
            transform: translateY(-2px);
        }
        .location-item.active { 
            background: white; 
            border-color: #eee;
            box-shadow: var(--soft-shadow);
        }

        .loc-indicator {
            width: 12px; height: 12px; border-radius: 50%; margin-right: 18px; flex-shrink: 0;
            border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .loc-content { flex: 1; }
        .loc-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; color: #2c2c2e; }
        .loc-type { font-size: 11px; color: var(--apple-sub); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }

        /* Map View */
        .map-wrapper { flex: 1; position: relative; background: #eee; }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* Detail Panel (Slide-in) */
        .detail-panel {
            position: absolute;
            top: 25px; bottom: 25px; right: 25px;
            width: 420px;
            background: var(--apple-glass);
            backdrop-filter: saturate(180%) blur(25px);
            -webkit-backdrop-filter: saturate(180%) blur(25px);
            border-radius: 30px;
            z-index: 3000;
            box-shadow: var(--deep-shadow);
            border: 1px solid rgba(255,255,255,0.4);
            transform: translateX(500px);
            transition: transform 0.7s var(--spring);
            padding: 40px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .detail-panel.open { transform: translateX(0); }

        .close-btn {
            position: absolute; top: 25px; right: 25px;
            background: rgba(0,0,0,0.05); border: none; border-radius: 50%;
            width: 32px; height: 32px; cursor: pointer; color: #3a3a3c;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            transition: background 0.2s;
        }
        .close-btn:hover { background: rgba(0,0,0,0.1); }

        .detail-content h2 { margin-top: 0; font-size: 28px; font-weight: 700; line-height: 1.2; letter-spacing: -0.5px; }
        .detail-label { 
            display: inline-block; padding: 6px 14px; border-radius: 10px; 
            font-size: 12px; font-weight: 800; text-transform: uppercase; 
            margin-bottom: 20px; color: #444; letter-spacing: 0.5px;
        }
        .detail-section { margin-top: 30px; border-top: 1px solid rgba(0,0,0,0.04); padding-top: 30px; }
        .detail-section h3 { font-size: 14px; font-weight: 700; color: var(--apple-sub); text-transform: uppercase; margin-bottom: 12px; }
        .detail-text { font-size: 16px; line-height: 1.6; color: #48484a; font-weight: 400; }

        .action-btn {
            margin-top: auto;
            background: white;
            color: #1c1c1e;
            text-align: center;
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s;
            border: 1px solid #eee;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.06); }
        .action-btn:active { transform: scale(0.97); }

        @media (max-width: 900px) {
            .sidebar { width: 0; display: none; }
            .detail-panel { width: calc(100% - 50px); right: 25px; bottom: 25px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="header">
                <h1>Inclusion.</h1>
                <div class="subtitle">Bordeaux Métropole • Pastel Edition</div>
            </div>
            
            <div class="search-container">
                <input type="text" class="search-bar" id="searchInput" placeholder="Rechercher un établissement...">
            </div>

            <div class="location-list" id="locationList">
                <!-- Dynamically Populated -->
            </div>
        </aside>

        <!-- Map -->
        <main class="map-wrapper">
            <div id="map"></div>
            
            <!-- Detail Side Panel -->
            <div id="detailPanel" class="detail-panel">
                <button class="close-btn" onclick="closeDetail()">&times;</button>
                <div id="detailContent" class="detail-content">
                    <!-- Dynamic -->
                </div>
                <a href="#" id="actionBtn" class="action-btn" target="_blank">Visiter le site web</a>
            </div>
        </main>
    </div>

    <!-- Leaflet & PapaParse -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const colorVibes = {
            'Association': { color: '#bae6fd', label: 'Association' },      // Soft Blue
            'Bibliothèque': { color: '#fbcfe8', label: 'Médiathèque' },    // Soft Pink
            'Commune': { color: '#bbf7d0', label: 'Municipalité' },       // Soft Green
            'Centre social': { color: '#fef08a', label: 'Social' },        // Soft Yellow
            'Tiers-lieu': { color: '#e9d5ff', label: 'Tiers-Lieu' },      // Soft Purple
            'Default': { color: '#f1f5f9', label: 'Service' }
        };

        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false 
        }).setView([44.837789, -0.57918], 13);
        
        // Premium Minimal Map
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        let allMarkers = [];
        const markersGroup = L.layerGroup().addTo(map);

        function getVibe(type) {
            if (type.includes('Association')) return colorVibes['Association'];
            if (type.includes('Bibliothèque')) return colorVibes['Bibliothèque'];
            if (type.includes('Commune') || type.includes('CCAS')) return colorVibes['Commune'];
            if (type.includes('Centre social')) return colorVibes['Centre social'];
            if (type.includes('Tiers-lieu')) return colorVibes['Tiers-lieu'];
            return colorVibes['Default'];
        }

        function openDetail(data, vibe) {
            const panel = document.getElementById('detailPanel');
            const content = document.getElementById('detailContent');
            const btn = document.getElementById('actionBtn');

            content.innerHTML = `
                <div class="detail-label" style="background: ${vibe.color}">${vibe.label}</div>
                <h2>${data.nom}</h2>
                
                <div class="detail-section">
                    <h3>Emplacement</h3>
                    <div class="detail-text">${data.adresse_brut || 'Non renseignée'}</div>
                </div>

                <div class="detail-section">
                    <h3>Description</h3>
                    <div class="detail-text">${data.description || 'Ce lieu propose des services d\'inclusion numérique pour tous.'}</div>
                </div>

                <div class="detail-section">
                    <h3>Accès</h3>
                    <div class="detail-text">${data.public_cible || 'Tout public'}</div>
                </div>
            `;

            if (data.contact_web) {
                btn.href = data.contact_web;
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }

            panel.classList.add('open');
            
            // UI Sync
            document.querySelectorAll('.location-item').forEach(item => item.classList.remove('active'));
            const listItem = document.getElementById(`list-item-${data.id}`);
            if (listItem) {
                listItem.classList.add('active');
                listItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            document.querySelectorAll('.location-item').forEach(item => item.classList.remove('active'));
        }

        fetch('met_lieux_inclusion_numerique.csv')
            .then(res => res.text())
            .then(csv => {
                Papa.parse(csv, {
                    header: true, delimiter: ";", skipEmptyLines: true,
                    complete: function(results) {
                        const listContainer = document.getElementById('locationList');
                        
                        results.data.forEach((row) => {
                            const lat = parseFloat(row.latitude);
                            const lng = parseFloat(row.longitude);
                            if (isNaN(lat) || isNaN(lng)) return;

                            const vibe = getVibe(row.type_lieu || '');

                            // Create Circle Marker
                            const marker = L.circleMarker([lat, lng], {
                                radius: 7,
                                fillColor: vibe.color,
                                color: 'white',
                                weight: 2.5,
                                opacity: 1,
                                fillOpacity: 1
                            }).addTo(markersGroup);

                            marker.on('click', () => {
                                map.setView([lat, lng], 15, { animate: true, duration: 0.8 });
                                openDetail(row, vibe);
                            });

                            // Sidebar Item
                            const item = document.createElement('div');
                            item.className = 'location-item';
                            item.id = `list-item-${row.id}`;
                            item.innerHTML = `
                                <div class="loc-indicator" style="background: ${vibe.color}"></div>
                                <div class="loc-content">
                                    <div class="loc-type">${vibe.label}</div>
                                    <div class="loc-name">${row.nom}</div>
                                </div>
                            `;
                            item.onclick = () => {
                                map.setView([lat, lng], 15, { animate: true, duration: 0.8 });
                                openDetail(row, vibe);
                            };
                            listContainer.appendChild(item);

                            allMarkers.push({ marker, item, row, vibe });
                        });
                    }
                });
            });

        // Soft Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            markersGroup.clearLayers();
            allMarkers.forEach(obj => {
                const match = obj.row.nom.toLowerCase().includes(query) || 
                              (obj.row.type_lieu || '').toLowerCase().includes(query);
                if (match) {
                    markersGroup.addLayer(obj.marker);
                    obj.item.style.display = 'flex';
                } else {
                    obj.item.style.display = 'none';
                }
            });
        });

        map.on('click', closeDetail);

    </script>
</body>
</html>
