<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inclusion High | BDX Metropolis</title>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --pink: #ff007f;
            --purple: #9d00ff;
            --cyan: #00f2ff;
            --gold: #ffd700;
            --bg-dark: rgba(10, 10, 15, 0.85);
            --neon-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
            --iridescent: linear-gradient(45deg, #ff007f, #9d00ff, #00f2ff, #ff007f);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050505;
            color: white;
            overflow: hidden;
        }

        #map { height: 100vh; width: 100%; z-index: 1; }

        /* The Maddy Panel */
        .maddy-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--bg-dark);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2px; /* For the gradient border effect */
            background-image: var(--iridescent);
            background-size: 300% 300%;
            animation: moveGradient 5s ease infinite;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5), 0 0 20px rgba(157, 0, 255, 0.3);
            width: 340px;
        }

        .panel-content {
            background: #0a0a0f;
            border-radius: 22px;
            padding: 24px;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 { 
            margin: 0 0 4px 0; font-size: 1.8em; font-weight: 800;
            letter-spacing: -1px;
            background: var(--iridescent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            font-style: italic;
        }

        .subtitle { font-size: 0.8em; color: #94a3b8; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        /* Disco Inputs */
        input, select {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-family: inherit;
            font-size: 0.9em;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, select:focus {
            border-color: var(--pink);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }

        /* Legend Style */
        .legend { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .legend-item { 
            display: flex; align-items: center; font-size: 0.7em; font-weight: 800;
            padding: 8px 10px; border-radius: 10px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            text-transform: uppercase;
        }
        .dot { height: 8px; width: 8px; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 8px currentColor; }

        /* Euphoria Popups */
        .leaflet-popup-content-wrapper { 
            background: #0a0a0f !important;
            color: white !important;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .leaflet-popup-tip { background: #0a0a0f !important; }
        
        .popup-card { padding: 10px; }
        .popup-tag {
            display: inline-block; padding: 4px 12px; border-radius: 30px;
            font-size: 0.65em; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 10px; color: #fff;
            box-shadow: 0 0 10px currentColor;
        }
        .popup-title { font-weight: 800; font-size: 1.2em; margin-bottom: 6px; color: white; }
        .popup-addr { font-size: 0.8em; color: #94a3b8; margin-bottom: 15px; }
        .popup-btn {
            display: block; text-align: center; 
            background: var(--iridescent);
            background-size: 200% 200%;
            color: white; text-decoration: none; padding: 10px; border-radius: 12px;
            font-weight: 800; font-size: 0.8em; text-transform: uppercase;
            transition: 0.3s;
        }
        .popup-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* Marker Glow Animation */
        @keyframes glow {
            0% { box-shadow: 0 0 5px currentColor; }
            50% { box-shadow: 0 0 20px currentColor; }
            100% { box-shadow: 0 0 5px currentColor; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="maddy-panel">
        <div class="panel-content">
            <h1>Euphoria.</h1>
            <div class="subtitle">Bordeaux Digital Glow</div>
            
            <div style="margin-bottom: 15px;">
                <input type="text" id="searchInput" placeholder="Search the vibe...">
            </div>
            
            <select id="typeFilter">
                <option value="all">Everywhere</option>
                <option value="Association">Associations</option>
                <option value="Bibliothèque">Libraries</option>
                <option value="Commune">City Halls</option>
                <option value="Centre social">Social Hubs</option>
                <option value="Tiers-lieu">Creative Spaces</option>
            </select>
            
            <div class="legend" id="legendItems">
                <!-- Populated via JS -->
            </div>
        </div>
    </div>

    <!-- Leaflet & PapaParse -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const vibes = {
            'Association': { color: '#ff007f', label: 'Association' }, // Neon Pink
            'Bibliothèque': { color: '#9d00ff', label: 'Library' },     // Electric Purple
            'Commune': { color: '#00f2ff', label: 'Municipal' },    // Neon Cyan
            'Centre social': { color: '#ffd700', label: 'Social Hub' }, // Disco Gold
            'Tiers-lieu': { color: '#ff4d00', label: 'Creative' },   // Hot Orange
            'Default': { color: '#ffffff', label: 'Other' }
        };

        const map = L.map('map', { zoomControl: false }).setView([44.837789, -0.57918], 13);
        
        // CartoDB Dark Matter - The absolute vibe
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let allMarkers = [];
        const markersGroup = L.layerGroup().addTo(map);

        // Populate Legend
        const leg = document.getElementById('legendItems');
        Object.entries(vibes).forEach(([k, v]) => {
            if (k === 'Default') return;
            const div = document.createElement('div');
            div.className = 'legend-item';
            div.style.color = v.color;
            div.innerHTML = `<span class="dot" style="background: ${v.color}"></span> ${v.label}`;
            leg.appendChild(div);
        });

        function getVibe(type) {
            if (type.includes('Association')) return vibes['Association'];
            if (type.includes('Bibliothèque')) return vibes['Bibliothèque'];
            if (type.includes('Commune') || type.includes('CCAS')) return vibes['Commune'];
            if (type.includes('Centre social')) return vibes['Centre social'];
            if (type.includes('Tiers-lieu')) return vibes['Tiers-lieu'];
            return vibes['Default'];
        }

        fetch('met_lieux_inclusion_numerique.csv')
            .then(res => res.text())
            .then(csv => {
                Papa.parse(csv, {
                    header: true, delimiter: ";", skipEmptyLines: true,
                    complete: function(results) {
                        results.data.forEach(row => {
                            const lat = parseFloat(row.latitude);
                            const lng = parseFloat(row.longitude);
                            if (isNaN(lat) || isNaN(lng)) return;

                            const vibe = getVibe(row.type_lieu || '');
                            
                            const marker = L.circleMarker([lat, lng], {
                                radius: 7,
                                fillColor: vibe.color,
                                color: 'white',
                                weight: 1,
                                opacity: 1,
                                fillOpacity: 0.8,
                                className: 'disco-marker'
                            });

                            const popupHTML = `
                                <div class="popup-card">
                                    <div class="popup-tag" style="background: ${vibe.color}; color: ${vibe.color === '#ffd700' ? '#000' : '#fff'}">${vibe.label}</div>
                                    <div class="popup-title">${row.nom}</div>
                                    <div class="popup-addr">${row.adresse_brut || ''}</div>
                                    <a href="${row.contact_web || '#'}" target="_blank" class="popup-btn">Explore Site</a>
                                </div>
                            `;

                            marker.bindPopup(popupHTML);
                            
                            allMarkers.push({
                                marker,
                                name: row.nom.toLowerCase(),
                                type: row.type_lieu || '',
                                services: (row.services || '').toLowerCase()
                            });

                            marker.addTo(markersGroup);
                        });
                    }
                });
            });

        function filter() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const t = document.getElementById('typeFilter').value;
            markersGroup.clearLayers();
            allMarkers.forEach(i => {
                if ((i.name.includes(s) || i.services.includes(s)) && (t === 'all' || i.type.includes(t))) {
                    markersGroup.addLayer(i.marker);
                }
            });
        }

        document.getElementById('searchInput').addEventListener('input', filter);
        document.getElementById('typeFilter').addEventListener('change', filter);

    </script>
</body>
</html>
