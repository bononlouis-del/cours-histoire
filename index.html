<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inclusion | Studio Edition</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --apple-blue: #007aff;
            --apple-bg: #f5f5f7;
            --apple-glass: rgba(255, 255, 255, 0.7);
            --apple-card: #ffffff;
            --apple-text: #1d1d1f;
            --apple-sub: #86868b;
            --spring: cubic-bezier(0.4, 0, 0.2, 1);
            --apple-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --apple-shadow-deep: 0 12px 30px rgba(0, 0, 0, 0.1);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--apple-bg);
            color: var(--apple-text);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout Container */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Sidebar: List View */
        .sidebar {
            width: 380px;
            background: white;
            border-right: 1px solid #e5e5e5;
            display: flex;
            flex-direction: column;
            z-index: 2000;
            transition: transform 0.4s var(--spring);
        }

        .header {
            padding: 32px 24px 16px 24px;
        }

        h1 { margin: 0; font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
        .subtitle { color: var(--apple-sub); font-size: 13px; margin-top: 4px; }

        /* Search Bar */
        .search-container {
            padding: 0 24px 20px 24px;
        }
        .search-bar {
            background: #f2f2f7;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            width: calc(100% - 32px);
            font-size: 15px;
            outline: none;
            transition: background 0.2s;
        }
        .search-bar:focus { background: #e5e5ea; }

        /* Location List */
        .location-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px;
            scrollbar-width: none;
        }
        .location-list::-webkit-scrollbar { display: none; }

        .location-item {
            padding: 16px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s var(--spring);
            margin-bottom: 4px;
        }
        .location-item:hover { background: #f5f5f7; }
        .location-item.active { background: #f0f7ff; color: var(--apple-blue); }
        .loc-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .loc-type { font-size: 12px; color: var(--apple-sub); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }

        /* Map View */
        .map-wrapper {
            flex: 1;
            position: relative;
        }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* Detail Panel (Slide-in) */
        .detail-panel {
            position: absolute;
            top: 20px;
            bottom: 20px;
            right: 20px;
            width: 400px;
            background: var(--apple-glass);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 20px;
            z-index: 3000;
            box-shadow: var(--apple-shadow-deep);
            border: 1px solid rgba(255,255,255,0.3);
            transform: translateX(450px);
            transition: transform 0.6s var(--spring);
            padding: 32px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .detail-panel.open { transform: translateX(0); }

        .close-btn {
            position: absolute; top: 20px; right: 20px;
            background: #e5e5ea; border: none; border-radius: 50%;
            width: 28px; height: 28px; cursor: pointer; color: #3a3a3c;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }

        .detail-content h2 { margin-top: 0; font-size: 24px; font-weight: 600; line-height: 1.2; }
        .detail-label { 
            display: inline-block; padding: 4px 10px; border-radius: 6px; 
            font-size: 11px; font-weight: 700; text-transform: uppercase; 
            margin-bottom: 16px; background: var(--apple-blue); color: white;
        }
        .detail-section { margin-top: 24px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 24px; }
        .detail-section h3 { font-size: 13px; font-weight: 600; color: var(--apple-sub); text-transform: uppercase; margin-bottom: 8px; }
        .detail-text { font-size: 15px; line-height: 1.5; color: var(--apple-text); }

        .action-btn {
            margin-top: auto;
            background: var(--apple-blue);
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.97); }

        /* Custom Marker Styles */
        .apple-marker {
            background: white;
            border: 2px solid var(--apple-blue);
            border-radius: 50%;
            box-shadow: var(--apple-shadow);
            transition: all 0.3s var(--spring);
        }
        .apple-marker:hover { transform: scale(1.3); z-index: 1000 !important; }

        /* Responsive */
        @media (max-width: 800px) {
            .sidebar { width: 0; display: none; }
            .detail-panel { width: calc(100% - 40px); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="header">
                <h1>Lieux d'Inclusion</h1>
                <div class="subtitle">Bordeaux Métropole • Studio Design</div>
            </div>
            
            <div class="search-container">
                <input type="text" class="search-bar" id="searchInput" placeholder="Rechercher un lieu...">
            </div>

            <div class="location-list" id="locationList">
                <!-- Populated via JS -->
            </div>
        </aside>

        <!-- Map -->
        <main class="map-wrapper">
            <div id="map"></div>
            
            <!-- Detail Side Panel -->
            <div id="detailPanel" class="detail-panel">
                <button class="close-btn" onclick="closeDetail()">&times;</button>
                <div id="detailContent" class="detail-content">
                    <!-- Dynamic -->
                </div>
                <a href="#" id="actionBtn" class="action-btn" target="_blank">Ouvrir le site</a>
            </div>
        </main>
    </div>

    <!-- Leaflet & PapaParse -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false 
        }).setView([44.837789, -0.57918], 13);
        
        // High Quality Light Theme (CartoDB Positron)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        let allMarkers = [];
        const markersGroup = L.layerGroup().addTo(map);

        function openDetail(data) {
            const panel = document.getElementById('detailPanel');
            const content = document.getElementById('detailContent');
            const btn = document.getElementById('actionBtn');

            content.innerHTML = `
                <div class="detail-label">${data.type_lieu || 'Service'}</div>
                <h2>${data.nom}</h2>
                
                <div class="detail-section">
                    <h3>Adresse</h3>
                    <div class="detail-text">${data.adresse_brut || 'Non renseignée'}</div>
                </div>

                <div class="detail-section">
                    <h3>À propos</h3>
                    <div class="detail-text">${data.description || 'Pas de description disponible pour ce lieu.'}</div>
                </div>

                <div class="detail-section">
                    <h3>Public cible</h3>
                    <div class="detail-text">${data.public_cible || 'Tout public'}</div>
                </div>
            `;

            if (data.contact_web) {
                btn.href = data.contact_web;
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }

            panel.classList.add('open');
            
            // Highlight in list
            document.querySelectorAll('.location-item').forEach(item => item.classList.remove('active'));
            const listItem = document.getElementById(`list-item-${data.id}`);
            if (listItem) {
                listItem.classList.add('active');
                listItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            document.querySelectorAll('.location-item').forEach(item => item.classList.remove('active'));
        }

        fetch('met_lieux_inclusion_numerique.csv')
            .then(res => res.text())
            .then(csv => {
                Papa.parse(csv, {
                    header: true, delimiter: ";", skipEmptyLines: true,
                    complete: function(results) {
                        const listContainer = document.getElementById('locationList');
                        
                        results.data.forEach((row, index) => {
                            const lat = parseFloat(row.latitude);
                            const lng = parseFloat(row.longitude);
                            if (isNaN(lat) || isNaN(lng)) return;

                            // Create Marker
                            const marker = L.circleMarker([lat, lng], {
                                radius: 6,
                                fillColor: '#007aff',
                                color: 'white',
                                weight: 2,
                                opacity: 1,
                                fillOpacity: 1
                            }).addTo(markersGroup);

                            marker.on('click', () => {
                                map.setView([lat, lng], 15, { animate: true, duration: 0.5 });
                                openDetail(row);
                            });

                            // Create List Item
                            const item = document.createElement('div');
                            item.className = 'location-item';
                            item.id = `list-item-${row.id}`;
                            item.innerHTML = `
                                <div class="loc-type">${row.type_lieu || 'Service'}</div>
                                <div class="loc-name">${row.nom}</div>
                            `;
                            item.onclick = () => {
                                map.setView([lat, lng], 15, { animate: true, duration: 0.5 });
                                openDetail(row);
                            };
                            listContainer.appendChild(item);

                            allMarkers.push({ marker, item, row });
                        });
                    }
                });
            });

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            markersGroup.clearLayers();
            
            allMarkers.forEach(obj => {
                const match = obj.row.nom.toLowerCase().includes(query) || 
                              (obj.row.type_lieu || '').toLowerCase().includes(query);
                
                if (match) {
                    markersGroup.addLayer(obj.marker);
                    obj.item.style.display = 'block';
                } else {
                    obj.item.style.display = 'none';
                }
            });
        });

        // Map Click to close
        map.on('click', closeDetail);

    </script>
</body>
</html>
