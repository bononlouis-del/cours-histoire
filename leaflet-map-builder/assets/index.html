<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Interactive - {{TITLE}}</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .popup-title { font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- PapaParse pour lire le CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        // Initialisation de la carte (coordonnées [lat, lng] et zoom)
        const map = L.map('map').setView([{{LAT}}, {{LNG}}], {{ZOOM}});

        // Ajout du fond de carte OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Chargement du fichier CSV
        fetch('{{CSV_FILENAME}}')
            .then(response => response.text())
            .then(csvString => {
                Papa.parse(csvString, {
                    header: true,
                    delimiter: "{{DELIMITER}}",
                    skipEmptyLines: true,
                    complete: function(results) {
                        results.data.forEach(row => {
                            const lat = parseFloat(row.{{LAT_COL}});
                            const lng = parseFloat(row.{{LNG_COL}});

                            if (!isNaN(lat) && !isNaN(lng)) {
                                const popupHTML = `
                                    <div class="popup-title">${row.{{NAME_COL}}}</div>
                                    <p>${row.{{DESC_COL}} || ''}</p>
                                `;

                                L.marker([lat, lng])
                                    .addTo(map)
                                    .bindPopup(popupHTML);
                            }
                        });
                    }
                });
            });
    </script>
</body>
</html>
