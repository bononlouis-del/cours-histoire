<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Interactive - ICPE & Réserves Naturelles Gironde</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #map { height: 100vh; width: 100vw; }
        
        /* Style pour la barre de recherche */
        .search-box {
            position: absolute;
            top: 20px;
            left: 70px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #rnnInput {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 220px;
            outline: none;
        }
        #rnnInput:focus { border-color: #16a34a; }
        .search-results {
            background: white;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            border: 1px solid #eee;
        }
        .search-results div {
            padding: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .search-results div:hover { background: #f0fdf4; color: #16a34a; }

        .legend {
            background: white;
            padding: 15px;
            line-height: 24px;
            color: #333;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="rnnInput" placeholder="Rechercher une réserve (RNN)..." autocomplete="off">
        <div id="results" class="search-results"></div>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const map = L.map('map').setView([44.837789, -0.57918], 9);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        const regimeColors = {
            'A': '#f59e0b', 'E': '#3b82f6', 'D': '#10b981', 'S': '#6366f1',
            'SEVESO_BAS': '#b91c1c', 'SEVESO_HAUT': '#450a0a', 'Inconnu': '#6b7280'
        };

        const icpeLayer = L.layerGroup();
        const sevesoBasLayer = L.layerGroup();
        const sevesoHautLayer = L.layerGroup();
        const rnnLayer = L.layerGroup();
        const ensLayer = L.layerGroup();

        async function loadICPE(url) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                L.geoJSON(data, {
                    pointToLayer: (feature, latlng) => {
                        const p = feature.properties;
                        const isHaut = p.cat_seveso === 'SEUIL_HAUT';
                        const isBas = p.cat_seveso === 'SEUIL_BAS';
                        const marker = L.circleMarker(latlng, {
                            radius: isHaut ? 9 : (isBas ? 7 : 4),
                            fillColor: isHaut ? regimeColors.SEVESO_HAUT : (isBas ? regimeColors.SEVESO_BAS : (regimeColors[p.regime?.charAt(0)] || regimeColors.Inconnu)),
                            color: (isHaut || isBas) ? "black" : "white",
                            weight: (isHaut || isBas) ? 2 : 1,
                            opacity: 1, fillOpacity: 0.8
                        });
                        if (isHaut) marker.addTo(sevesoHautLayer);
                        else if (isBas) marker.addTo(sevesoBasLayer);
                        else marker.addTo(icpeLayer);
                        return marker;
                    },
                    onEachFeature: (f, l) => {
                        const p = f.properties;
                        const label = p.cat_seveso && p.cat_seveso !== 'NON_SEVESO' ? `⚠️ SEVESO ${p.cat_seveso.replace('_', ' ')}` : `Régime: ${p.regime}`;
                        l.bindPopup(`<strong>${p.libelle || p.nom}</strong><br><em style="color:#666">${label}</em><br><a href="${p.fiche}" target="_blank">Fiche Géorisques</a>`);
                    }
                });
            } catch (e) { console.error(e); }
        }

        let rnnFeatures = [];

        async function loadRNN(url) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                rnnFeatures = data.features;
                L.geoJSON(data, {
                    style: {
                        color: '#16a34a',
                        weight: 2,
                        opacity: 0.8,
                        fillColor: '#22c55e',
                        fillOpacity: 0.3
                    },
                    onEachFeature: (f, l) => {
                        f.layer = l; // Stocker le layer pour y accéder
                        l.bindPopup(`<strong>${f.properties.nom_site}</strong><br><a href="${f.properties.url_fiche}" target="_blank">Fiche RNN →</a>`);
                    }
                }).addTo(rnnLayer);
            } catch (e) { console.error(e); }
        }

        // Logique de recherche
        const searchInput = document.getElementById('rnnInput');
        const resultsDiv = document.getElementById('results');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            resultsDiv.innerHTML = '';
            
            if (term.length < 2) {
                resultsDiv.style.display = 'none';
                return;
            }

            const matches = rnnFeatures.filter(f => 
                f.properties.nom_site.toLowerCase().includes(term)
            );

            if (matches.length > 0) {
                resultsDiv.style.display = 'block';
                matches.forEach(m => {
                    const div = document.createElement('div');
                    div.textContent = m.properties.nom_site;
                    div.onclick = () => {
                        if (m.layer.getBounds) {
                            map.fitBounds(m.layer.getBounds());
                        } else {
                            map.setView(m.layer.getLatLng(), 14);
                        }
                        m.layer.openPopup();
                        resultsDiv.style.display = 'none';
                        searchInput.value = m.properties.nom_site;
                    };
                    resultsDiv.appendChild(div);
                });
            } else {
                resultsDiv.style.display = 'none';
            }
        });

        // Fermer les résultats si on clique ailleurs
        document.addEventListener('click', (e) => {
            if (!document.querySelector('.search-box').contains(e.target)) {
                resultsDiv.style.display = 'none';
            }
        });

        async function loadENS(url) {
            try {
                const response = await fetch(url);
                const data = await response.json();
                L.geoJSON(data, {
                    style: { color: "#2980b9", weight: 1, opacity: 0.6, fillColor: "#3498db", fillOpacity: 0.2 },
                    onEachFeature: (f, l) => l.bindPopup(`<strong>ENS : ${f.properties.ens_libelle}</strong>`)
                }).addTo(ensLayer);
            } catch (e) { console.error(e); }
        }

        async function init() {
            await Promise.all([
                loadICPE('data/icpe_gironde.geojson'),
                loadRNN('data/rnn_gironde.geojson'),
                loadENS('data/ens_gironde.geojson')
            ]);

            sevesoHautLayer.addTo(map);
            sevesoBasLayer.addTo(map);
            icpeLayer.addTo(map);
            rnnLayer.addTo(map);
            ensLayer.addTo(map);

            const overlayMaps = {
                "⚠️ SEVESO Seuil Haut": sevesoHautLayer,
                "⚠️ SEVESO Seuil Bas": sevesoBasLayer,
                "ICPE (Autres)": icpeLayer,
                "Réserves Naturelles (RNN)": rnnLayer,
                "Espaces Naturels (ENS)": ensLayer
            };
            L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);
        }

        init();

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'info legend');
            div.innerHTML = '<strong>Légende</strong><br>' +
                `<i style="background: ${regimeColors.SEVESO_HAUT}"></i> SEVESO Haut<br>` +
                `<i style="background: ${regimeColors.SEVESO_BAS}"></i> SEVESO Bas<br>` +
                '<i style="background: #16a34a"></i> Réserve Naturelle (RNN)<br>' +
                '<i style="background: #3498db"></i> Espace Sensible (ENS)<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
