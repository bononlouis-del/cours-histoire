<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Environnemental National (Correction 2026)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-glass: rgba(255, 255, 255, 0.9);
            --apple-text: #1d1d1f;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: var(--apple-bg); overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        .header-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--apple-glass); backdrop-filter: blur(20px);
            padding: 12px 25px; border-radius: 20px; z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center; border: 1px solid rgba(255,255,255,0.4);
        }
        .legend {
            position: absolute; bottom: 30px; right: 20px;
            background: var(--apple-glass); backdrop-filter: blur(20px);
            padding: 15px; border-radius: 18px; z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); font-size: 12px; border: 1px solid rgba(255,255,255,0.4);
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 6px; }
        .circle { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; border: 1.5px solid white; }
        .box { width: 14px; height: 14px; border-radius: 3px; margin-right: 10px; }
        #loading {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; z-index: 999;
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <h1 style="margin:0; font-size:16px;">Atlas Environnemental National</h1>
        <div style="font-size:10px; color:#86868b; text-transform:uppercase;">Correction Flux 2026 (Migration Géoplateforme)</div>
    </div>

    <div id="loading">Initialisation de la carte...</div>

    <div id="map"></div>

    <div class="legend">
        <div style="font-weight:700; margin-bottom:10px;">Légende</div>
        <div class="legend-item"><div class="circle" style="background:#7f1d1d;"></div><span>Seveso Seuil Haut</span></div>
        <div class="legend-item"><div class="circle" style="background:#ef4444;"></div><span>Seveso Seuil Bas</span></div>
        <div class="legend-item"><div class="box" style="background:#059669; opacity:0.5;"></div><span>Zones Protégées (IGN)</span></div>
        <div class="legend-item"><div class="box" style="background:#2563eb; opacity:0.5;"></div><span>Parcs & Réserves (IGN)</span></div>
        <p style="font-size:9px; color:#888; margin-top:10px;">Zoomez pour charger les données régionales.</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { center: [44.837, -0.579], zoom: 9, zoomControl: false }); // Centré sur Gironde pour test
        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        const baseLayers = {
            "Plan": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(map),
            "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' })
        };

        // --- NOUVEAUX FLUX 2026 (GÉOPLATEFORME IGN & GÉORISQUES) ---

        // 1. Sites Seveso via Géorisques (Version 1.3.0 forcée)
        const seveso = L.tileLayer.wms('https://www.georisques.gouv.fr/services', {
            layers: 'ms:V_ETABLISSEMENT_SEVESO',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            attribution: 'Géorisques'
        }).addTo(map);

        // 2. Zones de protection de la nature via la Géoplateforme IGN (Remplace INPN indisponible)
        const zonesProt = L.tileLayer.wms('https://data.geopf.fr/wms-r/wms?', {
            layers: 'PROTECTEDAREAS.SIC', // Sites d'Importance Communautaire
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            attribution: 'IGN Géoplateforme'
        }).addTo(map);

        const reserves = L.tileLayer.wms('https://data.geopf.fr/wms-r/wms?', {
            layers: 'PROTECTEDAREAS.ZPS', // Zones de Protection Spéciale
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            attribution: 'IGN Géoplateforme'
        }).addTo(map);

        const overlays = {
            "⚠️ Sites Seveso": seveso,
            "Zones Protégées (SIC)": zonesProt,
            "Zones Spéciales (ZPS)": reserves
        };

        L.control.layers(baseLayers, overlays, { collapsed: false, position: 'topright' }).addTo(map);
        
        // Gestion du chargement
        let loadingCount = 0;
        [seveso, zonesProt, reserves].forEach(layer => {
            layer.on('loading', () => { loadingCount++; document.getElementById('loading').style.display = 'block'; document.getElementById('loading').innerText = 'Chargement des données...'; });
            layer.on('load', () => { loadingCount--; if(loadingCount <= 0) document.getElementById('loading').style.display = 'none'; });
            layer.on('tileerror', (e) => { console.error('WMS Error', e); document.getElementById('loading').innerText = 'Erreur serveur (Flux État saturé)'; });
        });
    </script>
</body>
</html>
