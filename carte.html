<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Environnemental National (Correction Finale)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f0f0f0; }
        #map { height: 100vh; width: 100vw; }
        .ui-panel {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 20px; border-radius: 25px; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; border: 2px solid #333;
        }
        .status-box {
            position: absolute; top: 70px; left: 15px; background: rgba(255,255,255,0.9);
            padding: 10px; border-radius: 8px; font-size: 11px; z-index: 1000;
            max-width: 250px; border: 1px solid #ccc;
        }
        .legend {
            position: absolute; bottom: 30px; right: 20px; background: white;
            padding: 15px; border-radius: 12px; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 12px;
        }
        .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1 style="margin:0; font-size:16px;">Atlas Environnemental National</h1>
        <div style="font-size:10px; color:#666;">Données en direct des serveurs d'État</div>
    </div>

    <div class="status-box" id="status">
        <strong>Diagnostic de connexion :</strong><br>
        <div id="msg-seveso">📡 Seveso : En attente...</div>
        <div id="msg-icpe">📡 ICPE : En attente...</div>
        <div id="msg-ign">📡 IGN : En attente...</div>
    </div>

    <div id="map"></div>

    <div class="legend">
        <strong>Légende</strong><br>
        <div style="margin-top:5px;"><span class="dot" style="background:#7f1d1d; border:1px solid white;"></span>Seveso</div>
        <div><span class="dot" style="background:#3b82f6; border:1px solid white;"></span>Installations Classées (ICPE)</div>
        <div><span class="dot" style="background:#059669; opacity:0.5;"></span>Zones Protégées</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { center: [46.5, 2.5], zoom: 6 });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- TENTATIVE 1 : GEORISQUES DIRECT ---
        const urlGeorisques = 'https://www.georisques.gouv.fr/services';
        
        const layerSeveso = L.tileLayer.wms(urlGeorisques, {
            layers: 'V_ETABLISSEMENT_SEVESO',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            attribution: 'Géorisques'
        }).addTo(map);

        const layerICPE = L.tileLayer.wms(urlGeorisques, {
            layers: 'INSTALLATIONS_CLASSEES_SIMPLIFIE',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            styles: 'ICPE_SIMPLIFIE_PE',
            attribution: 'Géorisques'
        }).addTo(map);

        // --- TENTATIVE 2 : IGN GEOPLATEFORME ---
        const urlIGN = 'https://data.geopf.fr/wms-r/wms?';
        const layerZones = L.tileLayer.wms(urlIGN, {
            layers: 'PROTECTEDAREAS.SIC,PROTECTEDAREAS.ZPS',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            attribution: 'IGN'
        }).addTo(map);

        // Diagnostic visuel
        function setStatus(id, msg, color) {
            const el = document.getElementById(id);
            el.innerText = msg;
            el.style.color = color;
        }

        layerSeveso.on('loading', () => setStatus('msg-seveso', '⌛ Seveso : Chargement...', 'orange'));
        layerSeveso.on('load', () => setStatus('msg-seveso', '✅ Seveso : OK', 'green'));
        layerSeveso.on('tileerror', () => setStatus('msg-seveso', '❌ Seveso : Erreur Serveur', 'red'));

        layerICPE.on('loading', () => setStatus('msg-icpe', '⌛ ICPE : Chargement...', 'orange'));
        layerICPE.on('load', () => setStatus('msg-icpe', '✅ ICPE : OK', 'green'));
        layerICPE.on('tileerror', () => setStatus('msg-icpe', '❌ ICPE : Erreur Serveur', 'red'));

        layerZones.on('loading', () => setStatus('msg-ign', '⌛ IGN : Chargement...', 'orange'));
        layerZones.on('load', () => setStatus('msg-ign', '✅ IGN : OK', 'green'));
        layerZones.on('tileerror', () => setStatus('msg-ign', '❌ IGN : Erreur Serveur', 'red'));

    </script>
</body>
</html>
