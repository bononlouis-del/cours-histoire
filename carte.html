<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Environnemental National (Vue Large)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-glass: rgba(255, 255, 255, 0.9);
            --apple-text: #1d1d1f;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; background: var(--apple-bg); overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        .header-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--apple-glass); backdrop-filter: blur(20px);
            padding: 12px 25px; border-radius: 20px; z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center; border: 1px solid rgba(255,255,255,0.4);
        }
        .legend {
            position: absolute; bottom: 30px; right: 20px;
            background: var(--apple-glass); backdrop-filter: blur(20px);
            padding: 15px; border-radius: 18px; z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); font-size: 11px; border: 1px solid rgba(255,255,255,0.4);
            width: 200px;
        }
        .legend-item { display: flex; align-items: center; margin-bottom: 6px; }
        .circle { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; border: 1.5px solid white; }
        .box { width: 12px; height: 12px; border-radius: 3px; margin-right: 10px; }
        #loading {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; z-index: 999;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header-panel">
        <h1 style="margin:0; font-size:16px;">Atlas Environnemental National</h1>
        <div style="font-size:10px; color:#86868b; text-transform:uppercase;">Visualisation ICPE & Seveso (Optimisée vue large)</div>
    </div>

    <div id="loading">Chargement des données...</div>

    <div id="map"></div>

    <div class="legend">
        <div style="font-weight:700; margin-bottom:10px;">Légende</div>
        <div class="legend-item"><div class="circle" style="background:#7f1d1d;"></div><span><b>Seveso Seuil Haut</b></span></div>
        <div class="legend-item"><div class="circle" style="background:#ef4444;"></div><span>Seveso Seuil Bas</span></div>
        <div class="legend-item"><div class="circle" style="background:#3b82f6;"></div><span>Autres ICPE (Vue large)</span></div>
        <div style="margin: 8px 0; border-top: 1px solid rgba(0,0,0,0.05);"></div>
        <div class="legend-item"><div class="box" style="background:#059669; opacity:0.5;"></div><span>Sites Protégés (SIC)</span></div>
        <div class="legend-item"><div class="box" style="background:#2563eb; opacity:0.5;"></div><span>Zones Spéciales (ZPS)</span></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { 
            center: [46.5, 2.5], 
            zoom: 6, 
            zoomControl: false 
        });
        
        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        const baseLayers = {
            "Plan": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(map),
            "Satellite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' })
        };

        // --- FLUX OPTIMISÉS POUR VUE LARGE ---

        // 1. ICPE Simplifiées (Visible de loin)
        const icpeSimple = L.tileLayer.wms('https://www.georisques.gouv.fr/services', {
            layers: 'INSTALLATIONS_CLASSEES_SIMPLIFIE',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            styles: 'ICPE_SIMPLIFIE_PE', // Style spécifique pour affichage par points de loin
            attribution: 'Géorisques'
        }).addTo(map);

        // 2. Sites Seveso
        const seveso = L.tileLayer.wms('https://www.georisques.gouv.fr/services', {
            layers: 'ms:V_ETABLISSEMENT_SEVESO',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            attribution: 'Géorisques'
        }).addTo(map);

        // 3. Zones IGN (Géoplateforme)
        const zonesProt = L.tileLayer.wms('https://data.geopf.fr/wms-r/wms?', {
            layers: 'PROTECTEDAREAS.SIC',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            attribution: 'IGN'
        }).addTo(map);

        const reserves = L.tileLayer.wms('https://data.geopf.fr/wms-r/wms?', {
            layers: 'PROTECTEDAREAS.ZPS',
            format: 'image/png',
            transparent: true,
            version: '1.3.0',
            attribution: 'IGN'
        }).addTo(map);

        const overlays = {
            "⚠️ ICPE Simplifiées (Vue large)": icpeSimple,
            "⚠️ Sites Seveso": seveso,
            "Zones Protégées (SIC)": zonesProt,
            "Zones Spéciales (ZPS)": reserves
        };

        L.control.layers(baseLayers, overlays, { collapsed: false, position: 'topright' }).addTo(map);
        
        // Gestion du chargement
        let loadingCount = 0;
        [icpeSimple, seveso, zonesProt, reserves].forEach(layer => {
            layer.on('loading', () => { 
                loadingCount++; 
                document.getElementById('loading').style.display = 'block'; 
            });
            layer.on('load', () => { 
                loadingCount--; 
                if(loadingCount <= 0) document.getElementById('loading').style.display = 'none'; 
            });
        });
    </script>
</body>
</html>
